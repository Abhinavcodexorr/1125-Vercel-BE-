services:
  - type: web
    name: palm-island-api
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: API_URL
        value: /api/v1/
      - key: API_PUBLIC_URL
        sync: false
      - key: DEFAULT_ADMIN_EMAIL
        sync: false
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false
      - key: AWS_ACCESS_KEY
        sync: false
      - key: AWS_SECRET_KEY
        sync: false
      - key: BUCKET_NAME
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_ENDPOINT
        sync: false
      - key: HUBTEL_API_ID
        sync: false
      - key: HUBTEL_API_KEY
        sync: false
      - key: HUBTEL_MERCHANT_ACCOUNT_NUMBER
        sync: false
      - key: HUBTEL_CALLBACK_URL
        sync: false
      - key: HUBTEL_RETURN_URL
        sync: false
      - key: MAILGUN_API_KEY
        sync: false
      - key: MAILGUN_DOMAIN
        sync: false
      - key: MAILGUN_BASE_URL
        value: https://api.eu.mailgun.net
      - key: FROM_EMAIL
        sync: false
